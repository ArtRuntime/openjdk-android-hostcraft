name: Build & Release OpenJDK for Android (HostCraft)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 */2 *'

permissions:
  contents: write
  actions: write

jobs:
  # ─────────────────────────────────────────────
  # Java 8 – Build from source (aarch32, aarch64, x86, x86_64)
  # ─────────────────────────────────────────────
  build_openjdk8:
    name: "Build OpenJDK 8 (${{ matrix.arch }})"
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [ "aarch32", "aarch64", "x86", "x86_64" ]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: set up JDK 1.7
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: zulu
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt -y install autoconf python3 python-is-python3 unzip zip systemtap-sdt-dev gcc-multilib g++-multilib libxtst-dev libasound2-dev libelf-dev libfontconfig1-dev libx11-dev libxrender-dev libxtst-dev libxt-dev
      - name: Build with CI build script
        run: bash "ci_build_arch_${{matrix.arch}}.sh"

      - name: Upload JRE build output
        uses: actions/upload-artifact@v4
        with:
          name: 'jre8-${{matrix.arch}}'
          path: jre8-*.tar.xz
      - name: Upload JRE debuginfo build output
        uses: actions/upload-artifact@v4
        with:
          name: "jre8-debuginfo-${{matrix.arch}}"
          path: dizout


  # ─────────────────────────────────────────────
  # Java 8 HostCraft structure (aarch64 repack)
  # ─────────────────────────────────────────────
  repackage_java8_hostcraft:
    name: "Repackage Java 8 HostCraft (${{ matrix.type }} - ${{ matrix.arch }})"
    needs: build_openjdk8
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [ "aarch32", "aarch64", "x86", "x86_64" ]
        type: [ "jre" ]
      fail-fast: false
    steps:
      - name: Get compiled ${{ matrix.type }}8-${{ matrix.arch }}
        uses: actions/download-artifact@v4
        with:
          name: "${{ matrix.type }}8-${{ matrix.arch }}"
          path: temp_download

      - name: Repackage Java 8 into standard lib/jvm structure
        run: |
          SRC_TAR=$(ls temp_download/${{ matrix.type }}8-*.tar.xz 2>/dev/null | head -1)
          if [ -z "$SRC_TAR" ]; then
            echo "ERROR: No ${{ matrix.type }}8-*.tar.xz found!"
            ls temp_download/ || true
            exit 1
          fi
          mkdir -p temp_extract
          tar xf "$SRC_TAR" -C temp_extract
          mkdir -p repack/java-8-openjdk
          cp -a temp_extract/* repack/java-8-openjdk/
          
          if [ "${{ matrix.arch }}" = "aarch32" ]; then
            ARCH_NAME="arm"
          elif [ "${{ matrix.arch }}" = "aarch64" ]; then
            ARCH_NAME="aarch64"
          else
            ARCH_NAME="${{ matrix.arch }}"
          fi
          
          OUTPUT="${{ matrix.type }}-8-${ARCH_NAME}.tar.xz"
          tar -cJf "$OUTPUT" -C repack .
          echo "Repackaged ${{ matrix.type }} 8 (${{ matrix.arch }}) successfully as $OUTPUT."

      - name: Upload Java 8 ${{ matrix.type }} ${{ matrix.arch }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.type }}-8-${{ matrix.arch }}"
          path: "${{ matrix.type }}-8-*.tar.xz"


  # ─────────────────────────────────────────────
  # Java 17, 21, 25 – repackaged from Termux
  # ─────────────────────────────────────────────
  repackage_termux_java:
    name: "Repackage Java ${{ matrix.java }} (${{ matrix.arch }})"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        java: [ 17, 21, 25 ]
        arch: [ "aarch32", "aarch64", "x86", "x86_64" ]
        exclude:
          - java: 25
            arch: "x86"

    steps:
      - name: Download Termux openjdk-${{ matrix.java }} .deb (${{ matrix.arch }})
        run: |
          if [ "${{ matrix.arch }}" = "aarch32" ]; then
            TERMUX_ARCH="arm"
          elif [ "${{ matrix.arch }}" = "aarch64" ]; then
            TERMUX_ARCH="aarch64"
          elif [ "${{ matrix.arch }}" = "x86" ]; then
            TERMUX_ARCH="i686"
          elif [ "${{ matrix.arch }}" = "x86_64" ]; then
            TERMUX_ARCH="x86_64"
          fi

          REPO="https://packages.termux.dev/apt/termux-main"
          PACKAGES_URL="$REPO/dists/stable/main/binary-$TERMUX_ARCH/Packages"
          echo "Fetching Packages index from $PACKAGES_URL..."
          curl -fsSL "$PACKAGES_URL" -o Packages

          PKG="openjdk-${{ matrix.java }}"
          FILENAME=$(awk -v pkg="$PKG" '
            /^Package:/ { inpkg = ($2 == pkg) }
            /^Filename:/ && inpkg { print $2; exit }
          ' Packages)

          if [ -z "$FILENAME" ]; then
            echo "ERROR: Package $PKG not found in Termux repository for $TERMUX_ARCH!"
            exit 1
          fi

          echo "Downloading: $REPO/$FILENAME"
          curl -fsSL "$REPO/$FILENAME" -o package.deb
          echo "Downloaded $(du -sh package.deb | cut -f1)"

      - name: Extract .deb and repackage as tar.xz
        run: |
          mkdir -p extracted
          cd extracted
          ar x ../package.deb
          DATA=$(ls data.tar.* 2>/dev/null | head -1)
          if [ -z "$DATA" ]; then
            echo "ERROR: No data.tar.* found in .deb"
            ls -la
            exit 1
          fi
          echo "Extracting $DATA..."
          tar xf "$DATA"
          cd ..

          JVM_DIR="java-${{ matrix.java }}-openjdk"

          # Find the jvm directory inside the extracted content
          JVM_SRC=$(find extracted -type d -name "$JVM_DIR" 2>/dev/null | head -1)
          if [ -z "$JVM_SRC" ]; then
            echo "ERROR: $JVM_DIR not found in extracted content"
            find extracted -type d | head -40
            exit 1
          fi
          echo "Found JVM at: $JVM_SRC"

          # Build output structure: java-XX-openjdk/
          mkdir -p repack
          cp -a "$JVM_SRC" "repack/$JVM_DIR"

          # Strip JDK-specific development tools and source files to make a lightweight JRE
          JVM_DEST="repack/$JVM_DIR"
          rm -rf "$JVM_DEST/lib/src.zip"
          rm -f "$JVM_DEST"/bin/javac \
                "$JVM_DEST"/bin/javap \
                "$JVM_DEST"/bin/javadoc \
                "$JVM_DEST"/bin/jshell \
                "$JVM_DEST"/bin/jlink \
                "$JVM_DEST"/bin/jmod \
                "$JVM_DEST"/bin/jdb \
                "$JVM_DEST"/bin/jcmd \
                "$JVM_DEST"/bin/jinfo \
                "$JVM_DEST"/bin/jmap \
                "$JVM_DEST"/bin/jps \
                "$JVM_DEST"/bin/jstack \
                "$JVM_DEST"/bin/jstat \
                "$JVM_DEST"/bin/jar \
                "$JVM_DEST"/bin/jarsigner

          if [ "${{ matrix.arch }}" = "aarch32" ]; then
            ARCH_NAME="arm"
          else
            ARCH_NAME="${{ matrix.arch }}"
          fi

          OUTPUT="jre-${{ matrix.java }}-$ARCH_NAME.tar.xz"
          tar -cJf "$OUTPUT" -C repack .
          echo "Created: $OUTPUT ($(du -sh $OUTPUT | cut -f1))"

      - name: Upload Java ${{ matrix.java }} ${{ matrix.arch }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: "jre-${{ matrix.java }}-${{ matrix.arch }}"
          path: "jre-${{ matrix.java }}-*.tar.xz"

  # ─────────────────────────────────────────────
  # Publish all versions as a single GitHub Release
  # ─────────────────────────────────────────────
  publish_release:
    name: "Publish GitHub Release"
    needs: [repackage_java8_hostcraft, repackage_termux_java]
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Get current date for version tag
        id: get_version
        run: |
          echo "version=openjdk-$(date '+%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: "HostCraft OpenJDK ${{ steps.get_version.outputs.version }}"
          body: |
            ## HostCraft OpenJDK Builds for Android
            
            Pre-built JRE (Java Runtime Environment) binaries for use with the HostCraft Minecraft server app.

            ### HostCraft JREs
            Each HostCraft-specific `.tar.xz` extracts directly under a `java-XX-openjdk/` directory.
            
            | Version | Architecture | File | Type | Source / Base |
            |---------|--------------|------|------|---------------|
            | Java 8  | `aarch64` | `jre-8-aarch64.tar.xz` | JRE | Built from [openjdk/jdk8u](https://github.com/openjdk/jdk8u) |
            | Java 8  | `arm` (aarch32) | `jre-8-arm.tar.xz` | JRE | Built from [openjdk/aarch32-port-jdk8u](https://github.com/openjdk/aarch32-port-jdk8u) |
            | Java 8  | `x86` | `jre-8-x86.tar.xz` | JRE | Built from [openjdk/jdk8u](https://github.com/openjdk/jdk8u) |
            | Java 8  | `x86_64` | `jre-8-x86_64.tar.xz` | JRE | Built from [openjdk/jdk8u](https://github.com/openjdk/jdk8u) |
            | Java 17 | `aarch64` | `jre-17-aarch64.tar.xz` | JRE | Repackaged Termux `openjdk-17` |
            | Java 17 | `arm` (aarch32) | `jre-17-arm.tar.xz` | JRE | Repackaged Termux `openjdk-17` |
            | Java 17 | `x86` | `jre-17-x86.tar.xz` | JRE | Repackaged Termux `openjdk-17` |
            | Java 17 | `x86_64` | `jre-17-x86_64.tar.xz` | JRE | Repackaged Termux `openjdk-17` |
            | Java 21 | `aarch64` | `jre-21-aarch64.tar.xz` | JRE | Repackaged Termux `openjdk-21` |
            | Java 21 | `arm` (aarch32) | `jre-21-arm.tar.xz` | JRE | Repackaged Termux `openjdk-21` |
            | Java 21 | `x86` | `jre-21-x86.tar.xz` | JRE | Repackaged Termux `openjdk-21` |
            | Java 21 | `x86_64` | `jre-21-x86_64.tar.xz` | JRE | Repackaged Termux `openjdk-21` |
            | Java 25 | `aarch64` | `jre-25-aarch64.tar.xz` | JRE | Repackaged Termux `openjdk-25` |
            | Java 25 | `arm` (aarch32) | `jre-25-arm.tar.xz` | JRE | Repackaged Termux `openjdk-25` |
            | Java 25 | `x86_64` | `jre-25-x86_64.tar.xz` | JRE | Repackaged Termux `openjdk-25` |

            ### Raw Multi-Arch OpenJDK 8 Builds (Extracts directly at root level)
            - **JRE 8 Tarballs:** `jre8-*.tar.xz` (`aarch32`, `aarch64`, `x86`, `x86_64`)

            ### How HostCraft JRE archives extract
            Each HostCraft-specific `.tar.xz` extracts directly into `java-XX-openjdk/`:
            ```
            java-8-openjdk/bin/java
            java-17-openjdk/bin/java
            java-21-openjdk/bin/java
            java-25-openjdk/bin/java
            ```
          draft: false
          prerelease: false
          files: |
            release-assets/*.tar.xz
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete temporary workflow artifacts
        run: |
          for id in $(gh api --paginate /repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --jq '.artifacts[].id'); do
            echo "Deleting artifact $id"
            gh api --method DELETE /repos/${{ github.repository }}/actions/artifacts/$id
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}