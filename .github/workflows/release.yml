name: Build & Release OpenJDK for Android (HostCraft)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 */2 *'

permissions:
  contents: write
  actions: write

jobs:
  # ─────────────────────────────────────────────
  # Java 8 – Build from source (aarch32, aarch64, x86, x86_64)
  # ─────────────────────────────────────────────
  build_openjdk8:
    name: "Build OpenJDK 8 (${{ matrix.arch }})"
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [ "aarch32", "aarch64", "x86", "x86_64" ]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: set up JDK 1.7
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: zulu
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt -y install autoconf python3 python-is-python3 unzip zip systemtap-sdt-dev gcc-multilib g++-multilib libxtst-dev libasound2-dev libelf-dev libfontconfig1-dev libx11-dev libxrender-dev libxtst-dev libxt-dev
      - name: Build with CI build script
        run: bash "ci_build_arch_${{matrix.arch}}.sh"
      - name: Upload JDK build output
        uses: actions/upload-artifact@v4
        with:
          name: "jdk8-${{matrix.arch}}"
          path: jdk8-*.tar.xz

      - name: Setup tmate session if failed
        if: ${{ failure() }}
        uses: mxschmitt/action-tmate@v3

      - name: Upload JRE build output
        uses: actions/upload-artifact@v4
        with:
          name: 'jre8-${{matrix.arch}}'
          path: jre8-*.tar.xz
      - name: Upload JRE debuginfo build output
        uses: actions/upload-artifact@v4
        with:
          name: "jre8-debuginfo-${{matrix.arch}}"
          path: dizout

  # ─────────────────────────────────────────────
  # Pojav Launcher Repackaging (all archs)
  # ─────────────────────────────────────────────
  pojav:
    name: "Repack JRE for Pojav"
    needs: build_openjdk8
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install zip
        run: sudo apt -y install zip
      - name: Get jre8-aarch32
        uses: actions/download-artifact@v4
        with:
          name: jre8-aarch32
          path: pojav
      - name: Get jre8-aarch64
        uses: actions/download-artifact@v4
        with:
          name: jre8-aarch64
          path: pojav
      - name: Get jre8-x86
        uses: actions/download-artifact@v4
        with:
          name: jre8-x86
          path: pojav
      - name: Get jre8-x86_64
        uses: actions/download-artifact@v4
        with:
          name: jre8-x86_64
          path: pojav
      - name: Repack JRE
        run: |
          bash "repackjre.sh" $GITHUB_WORKSPACE/pojav $GITHUB_WORKSPACE/pojav/jre8-pojav
          zip -j -r $GITHUB_WORKSPACE/jre8-pojav.zip $GITHUB_WORKSPACE/pojav/jre8-pojav/
      - name: Upload Pojav JRE artifact
        uses: actions/upload-artifact@v4
        with:
          name: jre8-pojav
          path: jre8-pojav.zip

  # ─────────────────────────────────────────────
  # Java 11, 17, 21, 25 – repackaged from Termux for Pojav
  # ─────────────────────────────────────────────
  repackage_termux_java:
    name: "Repackage Java ${{ matrix.java }} for Pojav"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - java: 11
            termux_pkg: openjdk-17
          - java: 17
            termux_pkg: openjdk-17
          - java: 21
            termux_pkg: openjdk-21
          - java: 25
            termux_pkg: openjdk-25

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt -y install curl jq unzip zip

      - name: Download debs for arm64, arm, x86_64, x86
        run: |
          download_deb() {
            local pkg=$1
            local arch=$2
            local dest_dir=$3
            local repo="https://packages.termux.dev/apt/termux-main"
            local index_url="$repo/dists/stable/main/binary-${arch}/Packages"
            
            echo "Fetching Packages index for ${arch}..."
            curl -fsSL "$index_url" -o Packages-${arch}
            
            local filename=$(awk -v pkg="$pkg" '
              /^Package:/ { inpkg = ($2 == pkg) }
              /^Filename:/ && inpkg { print $2; exit }
            ' Packages-${arch})
            
            if [ -z "$filename" ]; then
              echo "ERROR: Package $pkg not found for arch ${arch}!"
              exit 1
            fi
            
            echo "Downloading $arch: $repo/$filename"
            mkdir -p "$dest_dir"
            curl -fsSL "$repo/$filename" -o "$dest_dir/package_${arch}.deb"
          }
          
          download_deb "${{ matrix.termux_pkg }}" "aarch64" "download"
          download_deb "${{ matrix.termux_pkg }}" "arm" "download"
          download_deb "${{ matrix.termux_pkg }}" "x86_64" "download"
          download_deb "${{ matrix.termux_pkg }}" "i686" "download"

      - name: Extract deb packages
        run: |
          extract_deb() {
            local arch=$1
            local deb_file="download/package_${arch}.deb"
            local ext_dir="extracted_${arch}"
            mkdir -p "$ext_dir"
            cd "$ext_dir"
            ar x "../$deb_file"
            local data_tar=$(ls data.tar.* 2>/dev/null | head -1)
            tar xf "$data_tar"
            cd ..
          }
          
          extract_deb "aarch64"
          extract_deb "arm"
          extract_deb "x86_64"
          extract_deb "i686"

      - name: Repackage into Pojav structure
        run: |
          # Find the actual JVM directory for each arch
          jvm_arm64=$(find extracted_aarch64 -type d -name "java-*-openjdk" | head -1)
          jvm_arm=$(find extracted_arm -type d -name "java-*-openjdk" | head -1)
          jvm_x86_64=$(find extracted_x86_64 -type d -name "java-*-openjdk" | head -1)
          jvm_x86=$(find extracted_i686 -type d -name "java-*-openjdk" | head -1)
          
          if [ -z "$jvm_arm64" ] || [ -z "$jvm_arm" ] || [ -z "$jvm_x86_64" ] || [ -z "$jvm_x86" ]; then
            echo "ERROR: Could not find JVM directories!"
            exit 1
          fi
          
          echo "ARM64 JVM path: $jvm_arm64"
          echo "ARM JVM path: $jvm_arm"
          echo "x86_64 JVM path: $jvm_x86_64"
          echo "x86 JVM path: $jvm_x86"
          
          # Create universal directory
          mkdir -p repack/universal
          cp -a "$jvm_arm64"/* repack/universal/
          rm -rf repack/universal/bin
          find repack/universal -name "*.so" -delete
          find repack/universal -name "jspawnhelper" -delete
          
          cd repack/universal
          tar -cJf ../../universal.tar.xz .
          cd ../..
          
          # Package architecture specific binaries and libraries
          repack_bin() {
            local arch=$1
            local jvm_path=$2
            local tar_name=$3
            
            mkdir -p "repack/bin-${arch}"
            if [ -d "$jvm_path/bin" ]; then
              cp -a "$jvm_path/bin" "repack/bin-${arch}/"
            fi
            
            # Find and copy all shared libraries maintaining directory structure
            cd "$jvm_path"
            find lib \( -name "*.so" -o -name "jspawnhelper" \) | while read -r file; do
              mkdir -p "$GITHUB_WORKSPACE/repack/bin-${arch}/$(dirname "$file")"
              cp -a "$file" "$GITHUB_WORKSPACE/repack/bin-${arch}/$file"
            done
            cd "$GITHUB_WORKSPACE"
            
            cd "repack/bin-${arch}"
            tar -cJf "../../${tar_name}" .
            cd ../..
          }
          
          repack_bin "aarch64" "$jvm_arm64" "bin-arm64.tar.xz"
          repack_bin "arm" "$jvm_arm" "bin-arm.tar.xz"
          repack_bin "x86_64" "$jvm_x86_64" "bin-x86_64.tar.xz"
          repack_bin "x86" "$jvm_x86" "bin-x86.tar.xz"
          
          # Write version
          echo "${{ github.sha }}" > version
          
          # Create zip
          zip -j -r jre${{ matrix.java }}-pojav.zip universal.tar.xz bin-arm64.tar.xz bin-arm.tar.xz bin-x86_64.tar.xz bin-x86.tar.xz version

      - name: Upload Java ${{ matrix.java }} Pojav artifact
        uses: actions/upload-artifact@v4
        with:
          name: jre${{ matrix.java }}-pojav
          path: jre${{ matrix.java }}-pojav.zip

  # ─────────────────────────────────────────────
  # Publish all versions as a single GitHub Release
  # ─────────────────────────────────────────────
  publish_release:
    name: "Publish GitHub Release"
    needs: [pojav, repackage_termux_java]
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Get current date for version tag
        id: get_version
        run: |
          echo "version=openjdk-$(date '+%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: "HostCraft OpenJDK ${{ steps.get_version.outputs.version }}"
          body: |
            ## HostCraft OpenJDK Pojav JRE Builds for Android
            
            PojavLauncher compatibility format JRE zip archives for use on Android.
            
            ### Pojav JRE Zips
            - **Java 8 JRE:** `jre8-pojav.zip`
            - **Java 11 JRE:** `jre11-pojav.zip`
            - **Java 17 JRE:** `jre17-pojav.zip`
            - **Java 21 JRE:** `jre21-pojav.zip`
            - **Java 25 JRE:** `jre25-pojav.zip`
            
            Each `.zip` contains:
            - `universal.tar.xz`
            - `bin-arm.tar.xz`
            - `bin-arm64.tar.xz`
            - `bin-x86_64.tar.xz`
            - `version`
          draft: false
          prerelease: false
          files: |
            release-assets/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete temporary workflow artifacts
        run: |
          for id in $(gh api --paginate /repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --jq '.artifacts[].id'); do
            echo "Deleting artifact $id"
            gh api --method DELETE /repos/${{ github.repository }}/actions/artifacts/$id
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
