name: Build & Release OpenJDK for Android (HostCraft)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 */2 *'

permissions:
  contents: write
  actions: write

jobs:
  # ─────────────────────────────────────────────
  # Java 8 – Build from source (aarch32, aarch64, x86, x86_64)
  # ─────────────────────────────────────────────
  build_openjdk8:
    name: "Build OpenJDK 8 (${{ matrix.arch }})"
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [ "aarch32", "aarch64", "x86", "x86_64" ]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: set up JDK 1.7
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: zulu
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt -y install autoconf python3 python-is-python3 unzip zip systemtap-sdt-dev gcc-multilib g++-multilib libxtst-dev libasound2-dev libelf-dev libfontconfig1-dev libx11-dev libxrender-dev libxtst-dev libxt-dev
      - name: Build with CI build script
        run: bash "ci_build_arch_${{matrix.arch}}.sh"
      - name: Upload JDK build output
        uses: actions/upload-artifact@v4
        with:
          name: "jdk8-${{matrix.arch}}"
          path: jdk8-*.tar.xz

      - name: Setup tmate session if failed
        if: ${{ failure() }}
        uses: mxschmitt/action-tmate@v3

      - name: Upload JRE build output
        uses: actions/upload-artifact@v4
        with:
          name: 'jre8-${{matrix.arch}}'
          path: jre8-*.tar.xz
      - name: Upload JRE debuginfo build output
        uses: actions/upload-artifact@v4
        with:
          name: "jre8-debuginfo-${{matrix.arch}}"
          path: dizout

  # ─────────────────────────────────────────────
  # Pojav Launcher Repackaging (all archs)
  # ─────────────────────────────────────────────
  pojav:
    name: "Repack JRE for Pojav"
    needs: build_openjdk8
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install zip
        run: sudo apt -y install zip
      - name: Get jre8-aarch32
        uses: actions/download-artifact@v4
        with:
          name: jre8-aarch32
          path: pojav
      - name: Get jre8-aarch64
        uses: actions/download-artifact@v4
        with:
          name: jre8-aarch64
          path: pojav
      - name: Get jre8-x86
        uses: actions/download-artifact@v4
        with:
          name: jre8-x86
          path: pojav
      - name: Get jre8-x86_64
        uses: actions/download-artifact@v4
        with:
          name: jre8-x86_64
          path: pojav
      - name: Repack JRE
        run: |
          bash "repackjre.sh" $GITHUB_WORKSPACE/pojav $GITHUB_WORKSPACE/pojav/jre8-pojav
          zip -j -r $GITHUB_WORKSPACE/jre8-pojav.zip $GITHUB_WORKSPACE/pojav/jre8-pojav/
      - name: Upload Pojav JRE artifact
        uses: actions/upload-artifact@v4
        with:
          name: jre8-pojav
          path: jre8-pojav.zip

  # ─────────────────────────────────────────────
  # Java 8 HostCraft structure (aarch64 repack)
  # ─────────────────────────────────────────────
  repackage_java8_hostcraft:
    name: "Repackage Java 8 HostCraft (${{ matrix.type }} - ${{ matrix.arch }})"
    needs: build_openjdk8
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [ "aarch32", "aarch64", "x86", "x86_64" ]
        type: [ "jre", "jdk" ]
      fail-fast: false
    steps:
      - name: Get compiled ${{ matrix.type }}8-${{ matrix.arch }}
        uses: actions/download-artifact@v4
        with:
          name: "${{ matrix.type }}8-${{ matrix.arch }}"
          path: temp_download

      - name: Repackage Java 8 into standard lib/jvm structure
        run: |
          SRC_TAR=$(ls temp_download/${{ matrix.type }}8-*.tar.xz 2>/dev/null | head -1)
          if [ -z "$SRC_TAR" ]; then
            echo "ERROR: No ${{ matrix.type }}8-*.tar.xz found!"
            ls temp_download/ || true
            exit 1
          fi
          mkdir -p temp_extract
          tar xf "$SRC_TAR" -C temp_extract
          mkdir -p repack/lib/jvm/java-8-openjdk
          cp -a temp_extract/* repack/lib/jvm/java-8-openjdk/
          
          if [ "${{ matrix.arch }}" = "aarch32" ]; then
            ARCH_NAME="arm"
          elif [ "${{ matrix.arch }}" = "aarch64" ]; then
            ARCH_NAME="aarch64"
          else
            ARCH_NAME="${{ matrix.arch }}"
          fi
          
          OUTPUT="${{ matrix.type }}-8-${ARCH_NAME}.tar.xz"
          tar -cJf "$OUTPUT" -C repack .
          echo "Repackaged ${{ matrix.type }} 8 (${{ matrix.arch }}) successfully into lib/jvm structure as $OUTPUT."

      - name: Upload Java 8 ${{ matrix.type }} ${{ matrix.arch }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.type }}-8-${{ matrix.arch }}"
          path: "${{ matrix.type }}-8-*.tar.xz"

  # ─────────────────────────────────────────────
  # Java 11 – repackaged from Ubuntu openjdk-11
  # ─────────────────────────────────────────────
  repackage_java11_ubuntu:
    name: "Repackage Java 11 Ubuntu (aarch64)"
    runs-on: ubuntu-24.04
    steps:
      - name: Download Ubuntu openjdk-11 packages (arm64)
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          apt-get download openjdk-11-jre-headless:arm64 openjdk-11-jdk-headless:arm64

      - name: Extract and package as tar.xz
        run: |
          mkdir -p extracted
          for deb in *.deb; do
            echo "Extracting $deb..."
            dpkg-deb -x "$deb" extracted/
          done

          # Locate the JVM directory inside the extracted content
          # Ubuntu installs it at usr/lib/jvm/java-11-openjdk-arm64
          JVM_SRC=$(find extracted -type d -name "java-11-openjdk-arm64" 2>/dev/null | head -1)
          if [ -z "$JVM_SRC" ]; then
            echo "ERROR: java-11-openjdk-arm64 not found in extracted content"
            find extracted -type d | head -40
            exit 1
          fi
          echo "Found JVM at: $JVM_SRC"

          # Build output structure matching HostCraft prefix: lib/jvm/java-11-openjdk/
          mkdir -p repack/lib/jvm
          cp -a "$JVM_SRC" repack/lib/jvm/java-11-openjdk

          # Resolve any external symlinks to make the JVM self-contained
          find repack/lib/jvm/java-11-openjdk -type l | while read -r symlink; do
            target=$(readlink "$symlink")
            if [[ "$target" == /* ]]; then
              echo "Resolving external symlink: $symlink -> $target"
              if [ -e "extracted$target" ]; then
                rm "$symlink"
                cp -a "extracted$target" "$symlink"
              elif [ -e "$target" ]; then
                rm "$symlink"
                cp -a "$target" "$symlink"
              fi
            fi
          done

          OUTPUT="jre-11-aarch64.tar.xz"
          tar -cJf "$OUTPUT" -C repack .
          echo "Created: $OUTPUT ($(du -sh $OUTPUT | cut -f1))"

      - name: Upload Java 11 artifact
        uses: actions/upload-artifact@v4
        with:
          name: jre-11-aarch64
          path: jre-11-aarch64.tar.xz

  # ─────────────────────────────────────────────
  # Java 17, 21, 25 – repackaged from Termux
  # ─────────────────────────────────────────────
  repackage_termux_java:
    name: "Repackage Java ${{ matrix.java }} (aarch64)"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - java: 17
            termux_pkg: openjdk-17
            jvm_dir: java-17-openjdk
            symlink_as: ""
          - java: 21
            termux_pkg: openjdk-21
            jvm_dir: java-21-openjdk
            symlink_as: ""
          - java: 25
            termux_pkg: openjdk-25
            jvm_dir: java-25-openjdk
            symlink_as: ""

    steps:
      - name: Download Termux ${{ matrix.termux_pkg }} .deb (aarch64)
        run: |
          REPO="https://packages.termux.dev/apt/termux-main"
          PACKAGES_URL="$REPO/dists/stable/main/binary-aarch64/Packages"
          echo "Fetching Packages index..."
          curl -fsSL "$PACKAGES_URL" -o Packages

          PKG="${{ matrix.termux_pkg }}"
          FILENAME=$(awk -v pkg="$PKG" '
            /^Package:/ { inpkg = ($2 == pkg) }
            /^Filename:/ && inpkg { print $2; exit }
          ' Packages)

          if [ -z "$FILENAME" ]; then
            echo "ERROR: Package $PKG not found in Termux repository!"
            exit 1
          fi

          echo "Downloading: $REPO/$FILENAME"
          curl -fsSL "$REPO/$FILENAME" -o package.deb
          echo "Downloaded $(du -sh package.deb | cut -f1)"

      - name: Extract .deb and repackage as tar.xz
        run: |
          mkdir -p extracted
          cd extracted
          ar x ../package.deb
          DATA=$(ls data.tar.* 2>/dev/null | head -1)
          if [ -z "$DATA" ]; then
            echo "ERROR: No data.tar.* found in .deb"
            ls -la
            exit 1
          fi
          echo "Extracting $DATA..."
          tar xf "$DATA"
          cd ..

          # Find the jvm directory inside the extracted content
          JVM_SRC=$(find extracted -type d -name "${{ matrix.jvm_dir }}" 2>/dev/null | head -1)
          if [ -z "$JVM_SRC" ]; then
            echo "ERROR: ${{ matrix.jvm_dir }} not found in extracted content"
            find extracted -type d | head -40
            exit 1
          fi
          echo "Found JVM at: $JVM_SRC"

          # Build output structure matching HostCraft prefix: lib/jvm/java-XX-openjdk/
          mkdir -p repack/lib/jvm
          cp -a "$JVM_SRC" "repack/lib/jvm/${{ matrix.jvm_dir }}"

          # Create symlink so this version appears under the requested name
          if [ -n "${{ matrix.symlink_as }}" ]; then
            echo "Creating symlink: ${{ matrix.symlink_as }} -> ${{ matrix.jvm_dir }}"
            ln -sfn "${{ matrix.jvm_dir }}" "repack/lib/jvm/${{ matrix.symlink_as }}"
          fi

          OUTPUT="jre-${{ matrix.java }}-aarch64.tar.xz"
          tar -cJf "$OUTPUT" -C repack .
          echo "Created: $OUTPUT ($(du -sh $OUTPUT | cut -f1))"

      - name: Upload Java ${{ matrix.java }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: jre-${{ matrix.java }}-aarch64
          path: jre-${{ matrix.java }}-aarch64.tar.xz

  # ─────────────────────────────────────────────
  # Publish all versions as a single GitHub Release
  # ─────────────────────────────────────────────
  publish_release:
    name: "Publish GitHub Release"
    needs: [pojav, repackage_java8_hostcraft, repackage_java11_ubuntu, repackage_termux_java]
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Get current date for version tag
        id: get_version
        run: |
          echo "version=openjdk-$(date '+%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: "HostCraft OpenJDK ${{ steps.get_version.outputs.version }}"
          body: |
            ## HostCraft OpenJDK Builds for Android
            
            Pre-built Java runtimes and JDK/JRE binaries for use with the HostCraft Minecraft server app and PojavLauncher compatibility formats.

            ### HostCraft JREs / JDKs (extracts to standard prefix)
            Each HostCraft-specific `.tar.xz` extracts directly under `lib/jvm/java-XX-openjdk/` matching the HostCraft prefix path.
            
            | Version | Architecture | File | Type | Source / Base |
            |---------|--------------|------|------|---------------|
            | Java 8  | `aarch64` | `jre-8-aarch64.tar.xz` | JRE | Built from [openjdk/jdk8u](https://github.com/openjdk/jdk8u) |
            | Java 8  | `arm` (aarch32) | `jre-8-arm.tar.xz` | JRE | Built from [openjdk/aarch32-port-jdk8u](https://github.com/openjdk/aarch32-port-jdk8u) |
            | Java 8  | `x86` | `jre-8-x86.tar.xz` | JRE | Built from [openjdk/jdk8u](https://github.com/openjdk/jdk8u) |
            | Java 8  | `x86_64` | `jre-8-x86_64.tar.xz` | JRE | Built from [openjdk/jdk8u](https://github.com/openjdk/jdk8u) |
            | Java 8  | `aarch64` | `jdk-8-aarch64.tar.xz` | JDK | Built from [openjdk/jdk8u](https://github.com/openjdk/jdk8u) |
            | Java 8  | `arm` (aarch32) | `jdk-8-arm.tar.xz` | JDK | Built from [openjdk/aarch32-port-jdk8u](https://github.com/openjdk/aarch32-port-jdk8u) |
            | Java 8  | `x86` | `jdk-8-x86.tar.xz` | JDK | Built from [openjdk/jdk8u](https://github.com/openjdk/jdk8u) |
            | Java 8  | `x86_64` | `jdk-8-x86_64.tar.xz` | JDK | Built from [openjdk/jdk8u](https://github.com/openjdk/jdk8u) |
            | Java 11 | `aarch64` | `jre-11-aarch64.tar.xz` | JRE | Repackaged from Ubuntu `openjdk-11-jdk-headless` |
            | Java 17 | `aarch64` | `jre-17-aarch64.tar.xz` | JRE | Repackaged Termux `openjdk-17` |
            | Java 21 | `aarch64` | `jre-21-aarch64.tar.xz` | JRE | Repackaged Termux `openjdk-21` |
            | Java 25 | `aarch64` | `jre-25-aarch64.tar.xz` | JRE | Repackaged Termux `openjdk-25` |

            ### Raw Multi-Arch OpenJDK 8 Builds (Extracts directly at root level)
            - **JDK 8 Tarballs:** `jdk8-*.tar.xz` (`aarch32`, `aarch64`, `x86`, `x86_64`)
            - **JRE 8 Tarballs:** `jre8-*.tar.xz` (`aarch32`, `aarch64`, `x86`, `x86_64`)
            
            ### Pojav Launcher Compatibility JRE (Java 8)
            - **Asset:** `jre8-pojav.zip` (contains `universal.tar.xz`, `bin-arm.tar.xz`, `bin-arm64.tar.xz`, `bin-x86.tar.xz`, `bin-x86_64.tar.xz`, and `version`)

            ### How HostCraft JRE archives extract
            Each HostCraft-specific `.tar.xz` extracts into `lib/jvm/java-XX-openjdk/` matching the HostCraft prefix path:
            ```
            $PREFIX/lib/jvm/java-8-openjdk/bin/java
            $PREFIX/lib/jvm/java-11-openjdk/bin/java
            $PREFIX/lib/jvm/java-17-openjdk/bin/java
            $PREFIX/lib/jvm/java-21-openjdk/bin/java
            $PREFIX/lib/jvm/java-25-openjdk/bin/java
            ```
          draft: false
          prerelease: false
          files: |
            release-assets/*.tar.xz
            release-assets/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete temporary workflow artifacts
        run: |
          for id in $(gh api --paginate /repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --jq '.artifacts[].id'); do
            echo "Deleting artifact $id"
            gh api --method DELETE /repos/${{ github.repository }}/actions/artifacts/$id
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}